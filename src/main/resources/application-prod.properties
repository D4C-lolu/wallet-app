spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP connection pool tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# JPA performance tuning
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

spring.flyway.enabled=true

security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiry=${JWT_SECRET_EXPIRATION}
security.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRATION}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.flyway.locations=classpath:db/migration

# Disable unnecessary features
spring.jmx.enabled=false

# Loki host (set via environment variable, defaults to localhost)
loki.host=${LOKI_HOST:localhost}