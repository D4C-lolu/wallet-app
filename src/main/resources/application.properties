spring.application.name=wallet-app
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

server.port=${SERVER_PORT:8080}
spring.output.ansi.enabled=ALWAYS
logging.level.com.interswitch.walletapp=INFO
logging.level.com.zaxxer.hikari=WARN

spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider


management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when_authorized

management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Email Configuration
email.enabled=${EMAIL_ENABLED:true}
gmail.api.key=${GMAIL_API_KEY:}
gmail.sender.email=${GMAIL_SENDER_EMAIL:noreply@verveguard.com}
gmail.application.name=VerveguardAPI
email.queue.max-size=10000
email.queue.expire-after-write-minutes=30
email.max-retries=3
email.batch-size=50
email.process-interval-ms=5000
spring.jpa.properties.hibernate.javax.cache.missing_cache_strategy=create
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=100

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Verveguard Fraud Detection
verveguard.enabled=true
verveguard.block-threshold=70
verveguard.review-threshold=30

verveguard.blacklist.enabled=true
verveguard.rate-limit.enabled=true

verveguard.velocity.enabled=true
verveguard.velocity.threshold=3
verveguard.velocity.window-seconds=60
verveguard.velocity.score=30

verveguard.transaction-limit.enabled=true
verveguard.transaction-limit.score=25

verveguard.time-window.enabled=true
verveguard.time-window.start-hour=6
verveguard.time-window.end-hour=22
verveguard.time-window.score=10

verveguard.location-anomaly.enabled=true
verveguard.location-anomaly.anomaly-threshold=60
verveguard.location-anomaly.score=35

