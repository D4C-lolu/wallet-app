spring.application.name=wallet-app
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

server.port=${SERVER_PORT:8080}
spring.output.ansi.enabled=ALWAYS
logging.level.com.interswitch.walletapp=INFO
logging.level.com.zaxxer.hikari=WARN

spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider

spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when_authorized

management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Email Configuration
email.enabled=${EMAIL_ENABLED:true}
gmail.api.key=${GMAIL_API_KEY:}
gmail.sender.email=${GMAIL_SENDER_EMAIL:noreply@verveguard.com}
gmail.application.name=VerveguardAPI
email.queue.max-size=10000
email.queue.expire-after-write-minutes=30
email.max-retries=3
email.batch-size=50
email.process-interval-ms=5000