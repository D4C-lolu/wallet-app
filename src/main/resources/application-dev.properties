spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
verveguard.geo-ip.database-path=${GEOIP_DATABASE_PATH:/opt/geoip/GeoLite2-City.mmdb}
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2


security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiry=${JWT_SECRET_EXPIRATION}
security.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRATION}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs
spring.flyway.locations=classpath:db/migration

# Loki host (set via environment variable, defaults to localhost)
loki.host=${LOKI_HOST:localhost}