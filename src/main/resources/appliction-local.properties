# ?? DB ? points to localhost (run postgres via docker or local install) ????????
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:walletdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# ?? Flyway ????????????????????????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ?? Security ??????????????????????????????????????????????????????????????????
security.jwt.secret=${JWT_SECRET:local-dev-secret-change-me}
security.jwt.access-token-expiry=${JWT_SECRET_EXPIRATION:3600000}
security.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRATION:86400000}

# ?? API docs ? on locally ?????????????????????????????????????????????????????
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs

# ?? Loki ??????????????????????????????????????????????????????????????????????
loki.host=localhost

# ?? Hikari ? light pool for local ????????????????????????????????????????????
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.interswitch=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.flywaydb=INFO
logging.level.com.zaxxer.hikari=DEBUG

# ?? Misc ??????????????????????????????????????????????????????????????????????
spring.jmx.enabled=false
spring.output.ansi.enabled=ALWAYS